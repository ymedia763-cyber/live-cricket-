<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Cricket Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0c12 0%, #1a1d29 50%, #0a0c12 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            border-radius: 28px;
            background: rgba(10, 14, 24, 0.95);
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(59, 130, 246, 0.15),
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            animation: containerGlow 4s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 80px rgba(59, 130, 246, 0.25), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
        }

        .video-stage {
            position: relative;
            background: linear-gradient(145deg, #000 0%, #0a0e18 100%);
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            transition: transform 0.3s ease;
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: transparent;
            padding: 10px 14px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctrl-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .ctrl-btn svg {
            width: 18px;
            height: 18px;
            stroke: #f1f5f9;
            stroke-width: 1.8;
            fill: none;
            transition: all 0.2s ease;
            color: #f1f5f9;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .live-badge {
            background: linear-gradient(135deg, #e50914 0%, #ff1744 100%);
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            margin-left: 2px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            animation: livePulse 2s ease-in-out infinite;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(229, 9, 20, 0.8); transform: scale(1.02); }
        }

        .controls-right {
            display: flex;
            gap: 8px;
        }

        .hide-controls {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 25;
            gap: 20px;
            backdrop-filter: blur(3px);
        }

        .loading-overlay.initial-loading {
            background: linear-gradient(135deg, #03060c 0%, #0a0e18 100%);
            backdrop-filter: none;
        }

        .loading-overlay.initial-loading::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .three-dots-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            animation: dotBounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; box-shadow: 0 0 30px rgba(59, 130, 246, 0.9); }
        }

        .chat-panel {
            padding: 14px 16px 20px;
            background: rgba(10, 14, 24, 0.8);
            border-top: 1px solid rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(10px);
        }

        .viewer-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #11161f 0%, #1a1f2e 100%);
            border-radius: 50px;
            padding: 6px 14px;
            width: fit-content;
            margin-bottom: 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .viewer-stats:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .eye-icon svg {
            width: 16px;
            height: 16px;
            stroke: #94a3b8;
            filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.3));
        }

        .viewer-count {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e2e8f0;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .live-viewers {
            font-size: 0.7rem;
            color: #7e8ba3;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .chat-header h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chat-messages {
            background: linear-gradient(145deg, #0f131f 0%, #151a28 100%);
            border-radius: 20px;
            height: 240px;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .message-bubble {
            background: linear-gradient(135deg, #1a1f2e 0%, #252b3d 100%);
            padding: 8px 14px;
            border-radius: 24px;
            max-width: 90%;
            width: fit-content;
            font-size: 0.8rem;
            color: #eef2ff;
            border-left: 3px solid #3b82f6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message-bubble:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateX(5px);
        }

        .message-bubble strong {
            color: #60a5fa;
            font-weight: 600;
            margin-right: 6px;
            font-size: 0.8rem;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            align-items: center;
            background: linear-gradient(145deg, #0f131f 0%, #151a28 100%);
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .chat-input-area:focus-within {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: #5b6e8c;
        }

        .send-btn {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border: none;
            border-radius: 32px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .send-btn svg {
            width: 14px;
            height: 14px;
            stroke: white;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.6);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 10px;
        }

        .center-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 30;
            cursor: pointer;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .center-play-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .center-play-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.9) 0%, rgba(59, 130, 246, 0.9) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.6), 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: playPulse 2s ease-in-out infinite;
        }

        @keyframes playPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(59, 130, 246, 0.6), 0 4px 20px rgba(0, 0, 0, 0.4); }
            50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(59, 130, 246, 0.9), 0 4px 20px rgba(0, 0, 0, 0.4); }
        }

        .center-play-btn:hover {
            transform: scale(1.12);
            background: linear-gradient(135deg, rgba(29, 78, 216, 0.95) 0%, rgba(37, 99, 235, 0.95) 100%);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .center-play-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
            margin-left: 4px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        .social-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 12px 12px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            position: relative;
            z-index: 35;
            flex-wrap: wrap;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .social-btn:hover svg {
            transform: scale(1.1) rotate(-3deg);
        }

        .social-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .social-btn:active {
            transform: scale(0.96);
        }

        .youtube-btn { background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%); border-color: rgba(255, 0, 0, 0.3); }
        .tiktok-btn { background: linear-gradient(135deg, #161823 0%, #000000 100%); border-color: rgba(255, 255, 255, 0.15); }
        .whatsapp-btn { background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); border-color: rgba(37, 211, 102, 0.3); }

        .upcoming-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 35;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .upcoming-overlay.active { display: flex; }

        .upcoming-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.35);
        }

        .upcoming-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 8px 12px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .live-in-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 1px 10px rgba(251, 191, 36, 0.5);
            animation: labelPulse 2s ease-in-out infinite;
            margin-top: 0;
        }

        @keyframes labelPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        .countdown-box {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 4px 8px;
            min-width: 55px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .countdown-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            line-height: 1.1;
            font-family: 'Inter', system-ui, monospace;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        
        .countdown-label {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 2px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 1px 6px;
            border-radius: 20px;
        }

        .teams-vs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 6px;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 50px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,215,0,0.3);
        }

        .team-logo-wrap {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.7);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        .team-logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vs-text {
            font-size: 1.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(251, 191, 36, 0.4);
            letter-spacing: 1px;
            font-style: italic;
        }
        .vs-text::before {
            content: "⚡";
            font-size: 0.8rem;
            margin-right: 4px;
            opacity: 0.7;
        }
        .vs-text::after {
            content: "⚡";
            font-size: 0.8rem;
            margin-left: 4px;
            opacity: 0.7;
        }

        .match-time-text {
            font-size: 0.75rem;
            color: #e2e8f0;
            font-weight: 500;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.8);
            margin-top: 4px;
            background: rgba(0,0,0,0.4);
            padding: 2px 10px;
            border-radius: 30px;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .countdown-value { font-size: 1.3rem; }
            .countdown-item { padding: 3px 6px; min-width: 48px; }
            .team-logo-wrap { width: 48px; height: 48px; }
            .vs-text { font-size: 1rem; }
            .teams-vs { gap: 12px; padding: 4px 12px; }
            .live-in-label { font-size: 0.7rem; letter-spacing: 1.5px; }
            .social-btn { padding: 4px 10px; font-size: 0.65rem; }
            .social-btn svg { width: 16px; height: 16px; }
            .social-bar { gap: 8px; padding: 8px 8px; }
        }
        @media (max-width: 380px) {
            .team-logo-wrap { width: 42px; height: 42px; }
            .vs-text { font-size: 0.9rem; }
            .countdown-item { min-width: 42px; }
            .countdown-value { font-size: 1.1rem; }
        }
    </style>
</head>

            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

    <div class="video-stage" id="videoStage">

        <div class="custom-controls hide-controls" id="customControls">

                    <svg viewBox="0 0 24 24" id="pauseIconSvg" style="display: none;"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
                </button>
                <button class="ctrl-btn" id="muteBtn">
                    <svg viewBox="0 0 24 24" id="volumeIcon" stroke="currentColor"><path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
                    <svg viewBox="0 0 24 24" id="mutedIcon" style="display: none;" stroke="currentColor"><path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/><line x1="18" y1="6" x2="22" y2="10"/><line x1="22" y1="6" x2="18" y2="10"/></svg>

                    <div class="countdown-item" id="hourBox"><div class="countdown-value" id="cdHours">00</div><div class="countdown-label">H</div></div>
                    <div class="countdown-item" id="minBox"><div class="countdown-value" id="cdMinutes">00</div><div class="countdown-label">M</div></div>

                    <div class="team-logo-wrap"><img id="teamAImg" src="" alt="Team A"></div>

        <div class="viewer-stats">
            <span class="eye-icon"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
            <span class="viewer-count" id="viewerCountDisplay">0</span>
            <span class="live-viewers">watching now</span>
        </div>
        <div class="chat-header"><h4>LIVE CHAT</h4><span style="font-size:9px; color:#5b6e8c;">realtime</span></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Type your message ..." autocomplete="off"><button class="send-btn" id="sendChatBtn"><svg viewBox="0 0 24 24" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg><span>Send</span></button></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, onChildAdded, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBABN4TUkE2z5hfJHIBH1wT51yubP16FZA", authDomain: "chat-283ed.firebaseapp.com", databaseURL: "https://chat-283ed-default-rtdb.firebaseio.com", projectId: "chat-283ed", storageBucket: "chat-283ed.firebasestorage.app", messagingSenderId: "669885432854", appId: "1:669885432854:web:ba6185cdbbcc6f485ba137" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const streamUrlRef = ref(db, 'liveStream/url');
    const chatRef = ref(db, 'chat/messages');
    const nextStreamRef = ref(db, 'nextStream');

    const video = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const videoStage = document.getElementById('videoStage');
    const customControls = document.getElementById('customControls');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const centerPlayOverlay = document.getElementById('centerPlayOverlay');
    const centerPlayBtn = document.getElementById('centerPlayBtn');
    const playIcon = document.getElementById('playIconSvg');
    const pauseIcon = document.getElementById('pauseIconSvg');
    const volumeIcon = document.getElementById('volumeIcon');
    const mutedIcon = document.getElementById('mutedIcon');
    const upcomingOverlay = document.getElementById('upcomingOverlay');
    const upcomingBg = document.getElementById('upcomingBg');
    const cdDays = document.getElementById('cdDays');
    const cdHours = document.getElementById('cdHours');
    const cdMinutes = document.getElementById('cdMinutes');
    const cdSeconds = document.getElementById('cdSeconds');
    const dayBox = document.getElementById('dayBox');
    const teamAImg = document.getElementById('teamAImg');
    const teamBImg = document.getElementById('teamBImg');
    const matchTimeText = document.getElementById('matchTimeText');

    let hls = null;
    let isPlaying = true;
    let isMuted = false;
    let controlsTimeout = null;
    let currentStreamUrl = "";
    let isInitialLoad = true;
    let nextStreamTime = null;
    let countdownInterval = null;
    let isWaitingForScheduledStream = false;

    function showLoading(show) {
        if (show) { loadingOverlay.style.display = 'flex'; if (!isInitialLoad) loadingOverlay.classList.remove('initial-loading'); } 
        else { loadingOverlay.style.display = 'none'; if (isInitialLoad) isInitialLoad = false; }
    }
    function showCenterPlayButton() { centerPlayOverlay.classList.remove('hidden'); }
    function hideCenterPlayButton() { centerPlayOverlay.classList.add('hidden'); }
    function resetControlsTimer() {
        if (controlsTimeout) clearTimeout(controlsTimeout);
        customControls.classList.remove('hide-controls');
        controlsTimeout = setTimeout(() => customControls.classList.add('hide-controls'), 3500);
    }
    function updatePlayPauseUI() { playIcon.style.display = isPlaying ? 'none' : 'block'; pauseIcon.style.display = isPlaying ? 'block' : 'none'; }
    function updateMuteUI() { volumeIcon.style.display = isMuted ? 'none' : 'block'; mutedIcon.style.display = isMuted ? 'block' : 'none'; }
    
    function hideUpcomingOverlay() {
        upcomingOverlay.classList.remove('active');
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        isWaitingForScheduledStream = false;
        if (currentStreamUrl) {
        } else {
            onValue(streamUrlRef, (snap) => {
                const url = snap.val();
                if (url && !isWaitingForScheduledStream) loadStream(url);
            }, { onlyOnce: true });
        }
    }

    function initHLS(url) {
        if (hls) { hls.destroy(); hls = null; }
        video.muted = false; video.autoplay = false;
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url; video.load();
            showLoading(false); showCenterPlayButton();
        } else if (Hls.isSupported()) {
            hls = new Hls({ maxBufferLength: 30, backBufferLength: 5, lowLatencyMode: true, enableWorker: true, startLevel: 0 });
            hls.attachMedia(video);
            hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(url));
            hls.on(Hls.Events.MANIFEST_PARSED, () => { showLoading(false); showCenterPlayButton(); });
            hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) { if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { showLoading(true); hls.startLoad(); } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { hls.recoverMediaError(); } else { initHLS(url); } } });
        } else { console.error("HLS not supported"); showLoading(false); }
        currentStreamUrl = url;
    }
    
    function loadStream(url) {
        if (!url || url === currentStreamUrl) return;
        if (isWaitingForScheduledStream) {
            console.log("Scheduled stream active, ignoring stream URL until countdown ends");
            return;
        }
        showLoading(true);
        initHLS(url);
    }

    function updateCountdown() {
        if (!nextStreamTime) return;
        const now = Date.now();
        const distance = nextStreamTime - now;
        if (distance <= 0) {
            hideUpcomingOverlay();
            return;
        }
        const days = Math.floor(distance / 86400000);
        const hours = Math.floor((distance % 86400000) / 3600000);
        const minutes = Math.floor((distance % 3600000) / 60000);
        const seconds = Math.floor((distance % 60000) / 1000);
        if (days > 0) { dayBox.classList.remove('hidden'); cdDays.innerText = String(days).padStart(2,'0'); } else { dayBox.classList.add('hidden'); }
        cdHours.innerText = String(hours).padStart(2,'0');
        cdMinutes.innerText = String(minutes).padStart(2,'0');
        cdSeconds.innerText = String(seconds).padStart(2,'0');
    }

    onValue(nextStreamRef, (snapshot) => {
        const data = snapshot.val();
        const now = Date.now();
        
        if (data && data.time) {
            const streamDate = new Date(data.time).getTime();
            if (streamDate > now) {
                nextStreamTime = streamDate;
                isWaitingForScheduledStream = true;
                upcomingOverlay.classList.add('active');
                centerPlayOverlay.classList.add('hidden');
                customControls.classList.add('hide-controls');
                if (data.thumbnail) upcomingBg.style.backgroundImage = `url(${data.thumbnail})`;
                if (data.teamA) teamAImg.src = data.teamA;
                if (data.teamB) teamBImg.src = data.teamB;
                if (data.matchTime) matchTimeText.innerText = data.matchTime;
                if (!countdownInterval) {
                    countdownInterval = setInterval(updateCountdown, 1000);
                    updateCountdown();
                }
                if (hls) { hls.destroy(); hls = null; }
                if (video.src) { video.src = ""; video.load(); }
                currentStreamUrl = "";
                return;
            } else {
                hideUpcomingOverlay();
            }
        } else {
            hideUpcomingOverlay();
        }
    });

    onValue(streamUrlRef, (snapshot) => {
        const url = snapshot.val();
        if (url && !isWaitingForScheduledStream && url !== currentStreamUrl) {
            loadStream(url);
        }
    });

    // CHAT
    const username = "Viewer_" + Math.floor(Math.random() * 900 + 100);
    const chatContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');
    const TWENTY_FOUR_HOURS = 86400000;
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function appendMessage(user, text, msgId, timestamp) {
        const div = document.createElement('div'); div.className = 'message-bubble'; div.setAttribute('data-msg-id', msgId); div.setAttribute('data-timestamp', timestamp);
        div.innerHTML = `<strong>${escapeHtml(user)}</strong> ${escapeHtml(text)}`;
        chatContainer.appendChild(div); chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    onChildAdded(chatRef, (snapshot) => {
        const data = snapshot.val(); if (!data) return;
        if (Date.now() - (data.timestamp || 0) > TWENTY_FOUR_HOURS) { set(ref(db, `chat/messages/${snapshot.key}`), null); return; }
        appendMessage(data.username, data.text, snapshot.key, data.timestamp || Date.now());
    });
    function sendMessage() { const msg = chatInput.value.trim(); if (!msg) return; push(chatRef, { username, text: msg, timestamp: serverTimestamp() }); chatInput.value = ''; }
    sendBtn.addEventListener('click', sendMessage); chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // VIEWER COUNT
    const viewerId = Math.random().toString(36).substring(2) + Date.now();
    const myViewerRef = ref(db, `activeViewers/${viewerId}`);
    onDisconnect(myViewerRef).remove(); set(myViewerRef, { timestamp: serverTimestamp() });
    onValue(ref(db, 'activeViewers'), (snap) => { document.getElementById('viewerCountDisplay').innerText = Object.keys(snap.val() || {}).length; });

    // CONTROLS LOGIC
    let controlsVisible = false;
    function toggleControls(show) {
        if (show) { customControls.classList.remove('hide-controls'); controlsVisible = true; if (controlsTimeout) clearTimeout(controlsTimeout); controlsTimeout = setTimeout(() => { if (!controlsVisible) return; customControls.classList.add('hide-controls'); controlsVisible = false; }, 4000); } 
        else { customControls.classList.add('hide-controls'); controlsVisible = false; }
    }
    videoStage.addEventListener('click', (e) => { if (e.target.closest('.ctrl-btn')) return; toggleControls(!controlsVisible); });
    function handleControlClick(e, action) { e.stopPropagation(); if (!controlsVisible) { toggleControls(true); return; } action(); resetControlsTimer(); }
    playPauseBtn.addEventListener('click', (e) => handleControlClick(e, () => { if (video.paused) { video.play().then(() => { isPlaying = true; updatePlayPauseUI(); }).catch(e => console.log); } else { video.pause(); isPlaying = false; updatePlayPauseUI(); } }));
    muteBtn.addEventListener('click', (e) => handleControlClick(e, () => { video.muted = !video.muted; isMuted = video.muted; updateMuteUI(); }));
    fullscreenBtn.addEventListener('click', (e) => handleControlClick(e, async () => { if (!document.fullscreenElement) { await videoStage.requestFullscreen(); try { screen.orientation?.lock('landscape'); } catch(e){} } else { await document.exitFullscreen(); try { screen.orientation?.unlock(); } catch(e){} } }));

    centerPlayBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        hideCenterPlayButton();
        try { await video.play(); isPlaying = true; updatePlayPauseUI(); toggleControls(true); } catch (err) { console.warn("Play failed:", err); showCenterPlayButton(); if (!currentStreamUrl && !isWaitingForScheduledStream) { onValue(streamUrlRef, (snap) => { if (snap.val()) loadStream(snap.val()); }, { onlyOnce: true }); } }
    });
    centerPlayOverlay.addEventListener('click', (e) => { if (e.target === centerPlayOverlay || e.target === centerPlayBtn) centerPlayBtn.click(); });
    video.addEventListener('play', () => { isPlaying = true; updatePlayPauseUI(); hideCenterPlayButton(); showLoading(false); });
    video.addEventListener('pause', () => { isPlaying = false; updatePlayPauseUI(); });
    video.addEventListener('volumechange', () => { isMuted = video.muted; updateMuteUI(); });
    video.addEventListener('waiting', () => showLoading(true));
    video.addEventListener('playing', () => showLoading(false));
    video.addEventListener('canplay', () => { if (video.readyState >= 3) showLoading(false); });
    video.muted = false; isMuted = false; customControls.classList.add('hide-controls'); updateMuteUI(); updatePlayPauseUI(); showLoading(true);
</script>
</body>
