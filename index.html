<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Cricket · Multi Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: linear-gradient(135deg, #0a0c12 0%, #1a1d29 50%, #0a0c12 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            border-radius: 28px;
            background: rgba(10, 14, 24, 0.95);
            overflow: hidden;
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            animation: containerGlow 4s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 80px rgba(59, 130, 246, 0.25), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
        }

        .video-stage {
            position: relative;
            background: linear-gradient(145deg, #000 0%, #0a0e18 100%);
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Custom Controls - Original Small Size */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: transparent;
            padding: 10px 14px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctrl-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .ctrl-btn svg {
            width: 18px;
            height: 18px;
            stroke: #f1f5f9;
            stroke-width: 1.8;
            fill: none;
            transition: all 0.2s ease;
            color: #f1f5f9;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .live-badge {
            background: linear-gradient(135deg, #e50914 0%, #ff1744 100%);
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            margin-left: 2px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            animation: livePulse 2s ease-in-out infinite;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(229, 9, 20, 0.8); transform: scale(1.02); }
        }

        .controls-right {
            display: flex;
            gap: 8px;
        }

        .hide-controls {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* Loading Overlay (Three Dots) - Original */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 25;
            gap: 20px;
            backdrop-filter: blur(3px);
        }

        .loading-overlay.initial-loading {
            background: linear-gradient(135deg, #03060c 0%, #0a0e18 100%);
            backdrop-filter: none;
        }

        .loading-overlay.initial-loading::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .three-dots-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            animation: dotBounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; box-shadow: 0 0 30px rgba(59, 130, 246, 0.9); }
        }

        /* Center Play Button */
        .center-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 30;
            cursor: pointer;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .center-play-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .center-play-btn {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, rgba(37,99,235,0.9), rgba(59,130,246,0.9));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.3);
            animation: playPulse 2s infinite;
        }
        @keyframes playPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .center-play-btn svg { width: 32px; height: 32px; fill: white; margin-left: 4px; }

        /* Social Bar */
        .social-bar {
            display: flex; justify-content: center; gap: 12px; padding: 12px;
            background: linear-gradient(135deg, #0d1117, #161b22);
            border-bottom: 1px solid rgba(59,130,246,0.15);
            flex-wrap: wrap;
        }
        .social-btn {
            display: flex; align-items: center; gap: 6px; padding: 6px 12px;
            border-radius: 40px; text-decoration: none; font-size: 0.7rem; font-weight: 600;
            color: white; transition: 0.3s; background: rgba(0,0,0,0.5);
        }
        .social-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .social-btn:hover { transform: translateY(-1px); }
        .youtube-btn { background: #ff0000; }
        .tiktok-btn { background: #161823; }
        .whatsapp-btn { background: #25d366; }

        /* Carousel Slider - Centered, Snap, 10s auto-slide */
        .upcoming-slider-section {
            width: 100%;
            padding: 12px 0;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,215,0,0.2);
            border-bottom: 1px solid rgba(255,215,0,0.2);
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .slider-container {
            display: flex;
            gap: 0;
            padding: 0 5%;
        }
        .slider-card {
            flex: 0 0 90%;
            scroll-snap-align: center;
            margin: 0 5%;
            background: linear-gradient(135deg, #0f131f, #1a1f2e);
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.4);
            transition: all 0.2s ease;
            animation: stableGlow 2s infinite;
            cursor: pointer;
        }
        @keyframes stableGlow {
            0%,100% { box-shadow: 0 0 4px rgba(255,215,0,0.3); border-color: rgba(255,215,0,0.4); }
            50% { box-shadow: 0 0 12px rgba(255,215,0,0.6); border-color: rgba(255,215,0,0.7); }
        }
        .slider-card:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #1a1f2e, #252b3d);
        }
        .card-left, .card-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-logo-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid #fbbf24;
            object-fit: cover;
            background: #000;
        }
        .card-vs-small {
            font-size: 0.9rem;
            font-weight: bold;
            color: #fbbf24;
            margin: 0 4px;
        }
        .card-countdown-small {
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
        }
        .card-match-time-small {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-left: 8px;
        }
        @media (max-width: 480px) {
            .card-logo-small { width: 30px; height: 30px; }
            .card-countdown-small { font-size: 0.7rem; padding: 2px 8px; }
            .card-match-time-small { font-size: 0.6rem; }
            .slider-card { padding: 6px 12px; }
        }

        /* Chat Panel - Original Glowing */
        .chat-panel {
            padding: 14px 16px 20px;
            background: rgba(10,14,24,0.8);
            border-top: 1px solid rgba(59,130,246,0.15);
            backdrop-filter: blur(10px);
        }
        .viewer-stats {
            display: flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #11161f, #1a1f2e);
            border-radius: 50px; padding: 6px 14px; width: fit-content;
            margin-bottom: 16px; border: 1px solid rgba(59,130,246,0.2);
        }
        .eye-icon svg { width:16px; height:16px; stroke:#94a3b8; }
        .viewer-count { font-weight:700; font-size:0.9rem; color:#e2e8f0; text-shadow:0 0 10px rgba(59,130,246,0.3); }
        .live-viewers { font-size:0.7rem; color:#7e8ba3; }
        .chat-header { display:flex; justify-content:space-between; margin-bottom:10px; }
        .chat-header h4 { font-size:0.85rem; font-weight:600; color:#cbd5e6; text-transform:uppercase; }
        .chat-messages {
            background: linear-gradient(145deg, #0f131f, #151a28);
            border-radius:20px; height:220px; overflow-y:auto;
            padding:10px; display:flex; flex-direction:column; gap:8px;
            margin-bottom:10px; border:1px solid rgba(59,130,246,0.1);
        }
        .message-bubble {
            background: linear-gradient(135deg, #1a1f2e, #252b3d);
            padding:8px 14px; border-radius:24px; max-width:90%;
            font-size:0.8rem; color:#eef2ff; border-left:3px solid #3b82f6;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            animation:messageSlide 0.3s ease-out;
        }
        @keyframes messageSlide { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
        .message-bubble:hover { box-shadow:0 0 15px rgba(59,130,246,0.3); transform:translateX(5px); }
        .message-bubble strong { color:#60a5fa; margin-right:6px; text-shadow:0 0 8px rgba(96,165,250,0.4); }
        .chat-input-area {
            display:flex; gap:8px; align-items:center;
            background: linear-gradient(145deg, #0f131f, #151a28);
            border-radius:40px; padding:4px 4px 4px 16px;
            border:1px solid rgba(59,130,246,0.2);
        }
        .chat-input-area input { flex:1; background:transparent; border:none; padding:10px 0; color:white; outline:none; }
        .send-btn {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border:none; border-radius:32px; padding:8px 18px; color:white;
            display:flex; align-items:center; gap:6px; cursor:pointer;
        }
        .send-btn svg { width:14px; height:14px; stroke:white; }
        .chat-messages::-webkit-scrollbar { width:6px; }
        .chat-messages::-webkit-scrollbar-track { background:transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background:rgba(59,130,246,0.3); border-radius:10px; }
    </style>
</head>

    let controlsTimeout = null;
    let currentStreamUrl = "";
    let isInitialLoad = true;
    let upcomingStreams = [];
    let autoSlideInterval = null;
    let sliderIntervals = [];

    function showLoading(show) {
        if (show) { loadingOverlay.style.display = 'flex'; if (!isInitialLoad) loadingOverlay.classList.remove('initial-loading'); } 
        else { loadingOverlay.style.display = 'none'; if (isInitialLoad) isInitialLoad = false; }
    }
    function showCenterPlayButton() { centerPlayOverlay.classList.remove('hidden'); }
    function hideCenterPlayButton() { centerPlayOverlay.classList.add('hidden'); }
    function resetControlsTimer() {
        if (controlsTimeout) clearTimeout(controlsTimeout);
        customControls.classList.remove('hide-controls');
        controlsTimeout = setTimeout(() => customControls.classList.add('hide-controls'), 3500);
    }
    function updatePlayPauseUI() { playIcon.style.display = isPlaying ? 'none' : 'block'; pauseIcon.style.display = isPlaying ? 'block' : 'none'; }
    function updateMuteUI() { volumeIcon.style.display = isMuted ? 'none' : 'block'; mutedIcon.style.display = isMuted ? 'block' : 'none'; }

    function initHLS(url) {
        if (hls) { hls.destroy(); hls = null; }
        video.muted = false; video.autoplay = true;
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url; video.load();
            showLoading(false); 
            video.play().catch(e => showCenterPlayButton());
        } else if (Hls.isSupported()) {
            hls = new Hls({ maxBufferLength: 30, backBufferLength: 5, lowLatencyMode: true, enableWorker: true, startLevel: 0 });
            hls.attachMedia(video);
            hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(url));
            hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                showLoading(false); 
                video.play().then(() => hideCenterPlayButton()).catch(() => showCenterPlayButton());
            });
            hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) { if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { showLoading(true); hls.startLoad(); } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { hls.recoverMediaError(); } else { initHLS(url); } } });
        } else { console.error("HLS not supported"); showLoading(false); }
        currentStreamUrl = url;
    }

    function loadStream(url) {
        if (!url || url === currentStreamUrl) return;
        showLoading(true);
        initHLS(url);
    }

    video.addEventListener('waiting', () => showLoading(true));
    video.addEventListener('playing', () => showLoading(false));
    video.addEventListener('canplay', () => { if (video.readyState >= 3) showLoading(false); });

    function getNearestFutureStream() {
        const now = Date.now();
        const future = upcomingStreams.filter(s => new Date(s.time).getTime() > now);
        future.sort((a,b) => new Date(a.time) - new Date(b.time));
        return future[0] || null;
    }

    // Auto-slide every 10 seconds (slower)
    function startAutoSlide() {
        if (autoSlideInterval) clearInterval(autoSlideInterval);
        autoSlideInterval = setInterval(() => {
            const slider = document.querySelector('.upcoming-slider-section');
            if (!slider) return;
            const cardWidth = document.querySelector('.slider-card')?.offsetWidth + (document.querySelector('.slider-card')?.offsetWidth * 0.1) || 300;
            const scrollAmount = slider.scrollLeft + cardWidth;
            slider.scrollTo({ left: scrollAmount, behavior: 'smooth' });
            // Loop to start if at end
            if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 50) {
                setTimeout(() => slider.scrollTo({ left: 0, behavior: 'smooth' }), 1000);
            }
        }, 10000); // 10 seconds
    }

    // Render carousel (one card centered)
    function renderSlider() {
        sliderContainer.innerHTML = '';
        sliderIntervals.forEach(clearInterval);
        sliderIntervals = [];
        if (!upcomingStreams.length) {
            sliderContainer.innerHTML = '<div style="color:#7e8ba3; text-align:center; width:100%; padding:15px;">No upcoming matches scheduled</div>';
            return;
        }
        upcomingStreams.forEach((stream, idx) => {
            const card = document.createElement('div');
            card.className = 'slider-card';
            const streamDate = new Date(stream.time).getTime();
            card.innerHTML = `
                <div class="card-left">
                    <img class="card-logo-small" src="${stream.teamA || ''}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%233b82f6%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%2210%22/%3E%3C/svg%3E'">
                    <span class="card-vs-small">VS</span>
                    <img class="card-logo-small" src="${stream.teamB || ''}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%233b82f6%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%2210%22/%3E%3C/svg%3E'">
                </div>
                <div class="card-right">
                    <span class="card-countdown-small" id="cardCountdown-${idx}">--:--:--</span>
                    <span class="card-match-time-small">${escapeHtml(stream.matchTime || '')}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                if (stream.m3u8Url) loadStream(stream.m3u8Url);
            });
            sliderContainer.appendChild(card);
            const updateCardTimer = () => {
                const now = Date.now();
                const dist = streamDate - now;
                const cdSpan = document.getElementById(`cardCountdown-${idx}`);
                if (cdSpan) {
                    if (dist <= 0) cdSpan.innerText = "LIVE NOW";
                    else {
                        const hrs = Math.floor(dist / 3600000);
                        const mins = Math.floor((dist % 3600000) / 60000);
                        const secs = Math.floor((dist % 60000) / 1000);
                        cdSpan.innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                    }
                }
            };
            updateCardTimer();
            const interval = setInterval(updateCardTimer, 1000);
            sliderIntervals.push(interval);
        });
        startAutoSlide();
    }

    video.addEventListener('ended', () => {
        const next = getNearestFutureStream();
        if (next && next.m3u8Url) {
            loadStream(next.m3u8Url);
            const updated = upcomingStreams.filter(s => s.time !== next.time);
            set(upcomingRef, updated);
        }
    });

    onValue(forceSwitchRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.stream && data.stream.m3u8Url) {
            loadStream(data.stream.m3u8Url);
            const updated = upcomingStreams.filter(s => s.time !== data.stream.time);
            set(upcomingRef, updated);
            set(forceSwitchRef, null);
        }
    });

    onValue(upcomingRef, (snap) => {
        upcomingStreams = snap.val() || [];
        renderSlider();
    });

    onValue(liveStreamRef, (snap) => {
        const url = snap.val();
        if (url) loadStream(url);
    });

    // Chat
    const username = "Viewer_" + Math.floor(Math.random() * 900 + 100);
    const chatContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function appendMessage(user, text) {
        const div = document.createElement('div'); div.className = 'message-bubble';
        div.innerHTML = `<strong>${escapeHtml(user)}</strong> ${escapeHtml(text)}`;
        chatContainer.appendChild(div); chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    onChildAdded(chatRef, (snapshot) => { const data = snapshot.val(); if(data) appendMessage(data.username, data.text); });
    function sendMessage() { const msg = chatInput.value.trim(); if(msg) { push(chatRef, { username, text: msg, timestamp: serverTimestamp() }); chatInput.value = ''; } }
    sendBtn.addEventListener('click', sendMessage); chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Viewer count
    const viewerId = Math.random().toString(36).substring(2) + Date.now();
    const myViewerRef = ref(db, `activeViewers/${viewerId}`);
    onDisconnect(myViewerRef).remove(); set(myViewerRef, { timestamp: serverTimestamp() });
    onValue(ref(db, 'activeViewers'), (snap) => { document.getElementById('viewerCountDisplay').innerText = Object.keys(snap.val() || {}).length; });

    // Controls toggle
    let controlsVisible = false;
    function toggleControls(show) {
        if (show) { customControls.classList.remove('hide-controls'); controlsVisible = true; if (controlsTimeout) clearTimeout(controlsTimeout); controlsTimeout = setTimeout(() => { customControls.classList.add('hide-controls'); controlsVisible = false; }, 4000); } 
        else { customControls.classList.add('hide-controls'); controlsVisible = false; }
    }
    videoStage.addEventListener('click', (e) => { if (!e.target.closest('.ctrl-btn')) toggleControls(!controlsVisible); });
    function handleControlClick(e, action) { e.stopPropagation(); if (!controlsVisible) { toggleControls(true); return; } action(); resetControlsTimer(); }
    playPauseBtn.addEventListener('click', (e) => handleControlClick(e, () => { if (video.paused) video.play().then(() => { isPlaying = true; updatePlayPauseUI(); }); else { video.pause(); isPlaying = false; updatePlayPauseUI(); } }));
    muteBtn.addEventListener('click', (e) => handleControlClick(e, () => { video.muted = !video.muted; isMuted = video.muted; updateMuteUI(); }));
    fullscreenBtn.addEventListener('click', (e) => handleControlClick(e, async () => { if (!document.fullscreenElement) await videoStage.requestFullscreen(); else await document.exitFullscreen(); }));
    centerPlayBtn.addEventListener('click', async () => { hideCenterPlayButton(); try { await video.play(); isPlaying = true; updatePlayPauseUI(); } catch(e) { showCenterPlayButton(); } });
    video.addEventListener('play', () => { isPlaying = true; updatePlayPauseUI(); hideCenterPlayButton(); });
    video.addEventListener('pause', () => { isPlaying = false; updatePlayPauseUI(); });
    video.addEventListener('volumechange', () => { isMuted = video.muted; updateMuteUI(); });
    video.muted = false; isMuted = false; customControls.classList.add('hide-controls'); updateMuteUI(); updatePlayPauseUI(); showLoading(true);

    // Disable copy
    document.addEventListener('copy', (e) => e.preventDefault());
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.body.style.webkitTouchCallout = 'none';
</script>
</body>
</html>
