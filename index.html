<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live cricket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0c12 0%, #1a1d29 50%, #0a0c12 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            border-radius: 28px;
            background: rgba(10, 14, 24, 0.95);
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(59, 130, 246, 0.15),
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            animation: containerGlow 4s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 80px rgba(59, 130, 246, 0.25), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
        }

        /* Video Stage */
        .video-stage {
            position: relative;
            background: linear-gradient(145deg, #000 0%, #0a0e18 100%);
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            transition: transform 0.3s ease;
        }

        /* Custom Controls Overlay - Simplified & Smaller */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: transparent;
            padding: 10px 14px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctrl-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .ctrl-btn svg {
            width: 18px;
            height: 18px;
            stroke: #f1f5f9;
            stroke-width: 1.8;
            fill: none;
            transition: all 0.2s ease;
            color: #f1f5f9;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .live-badge {
            background: linear-gradient(135deg, #e50914 0%, #ff1744 100%);
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            margin-left: 2px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            animation: livePulse 2s ease-in-out infinite;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes livePulse {
            0%, 100% { 
                box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 25px rgba(229, 9, 20, 0.8);
                transform: scale(1.02);
            }
        }

        .controls-right {
            display: flex;
            gap: 8px;
        }

        .hide-controls {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* Enhanced Loading Overlay with Three Dots - Transparent Background */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 25;
            gap: 20px;
            backdrop-filter: blur(3px);
        }

        .loading-overlay.initial-loading {
            background: linear-gradient(135deg, #03060c 0%, #0a0e18 100%);
            backdrop-filter: none;
        }

        .loading-overlay.initial-loading::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .three-dots-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            animation: dotBounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes dotBounce {
            0%, 80%, 100% { 
                transform: scale(0.6);
                opacity: 0.5;
            }
            40% { 
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.9);
            }
        }

        /* Chat Panel */
        .chat-panel {
            padding: 14px 16px 20px;
            background: rgba(10, 14, 24, 0.8);
            border-top: 1px solid rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(10px);
        }

        .viewer-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #11161f 0%, #1a1f2e 100%);
            border-radius: 50px;
            padding: 6px 14px;
            width: fit-content;
            margin-bottom: 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .viewer-stats:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .eye-icon svg {
            width: 16px;
            height: 16px;
            stroke: #94a3b8;
            filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.3));
        }

        .viewer-count {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e2e8f0;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .live-viewers {
            font-size: 0.7rem;
            color: #7e8ba3;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .chat-header h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chat-messages {
            background: linear-gradient(145deg, #0f131f 0%, #151a28 100%);
            border-radius: 20px;
            height: 240px;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .message-bubble {
            background: linear-gradient(135deg, #1a1f2e 0%, #252b3d 100%);
            padding: 8px 14px;
            border-radius: 24px;
            max-width: 90%;
            width: fit-content;
            font-size: 0.8rem;
            color: #eef2ff;
            border-left: 3px solid #3b82f6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-bubble:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateX(5px);
        }

        .message-bubble strong {
            color: #60a5fa;
            font-weight: 600;
            margin-right: 6px;
            font-size: 0.8rem;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            align-items: center;
            background: linear-gradient(145deg, #0f131f 0%, #151a28 100%);
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .chat-input-area:focus-within {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: #5b6e8c;
        }

        .send-btn {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border: none;
            border-radius: 32px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .send-btn svg {
            width: 14px;
            height: 14px;
            stroke: white;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.6);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
        }

        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.5);
        }

        /* Center Play Button Overlay */
        .center-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 30;
            cursor: pointer;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .center-play-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .center-play-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.9) 0%, rgba(59, 130, 246, 0.9) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.6), 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: playPulse 2s ease-in-out infinite;
        }

        @keyframes playPulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 40px rgba(59, 130, 246, 0.6), 0 4px 20px rgba(0, 0, 0, 0.4);
            }
            50% { 
                transform: scale(1.08);
                box-shadow: 0 0 60px rgba(59, 130, 246, 0.9), 0 4px 20px rgba(0, 0, 0, 0.4);
            }
        }

        .center-play-btn:hover {
            transform: scale(1.12);
            background: linear-gradient(135deg, rgba(29, 78, 216, 0.95) 0%, rgba(37, 99, 235, 0.95) 100%);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .center-play-btn:active {
            transform: scale(0.95);
        }

        .center-play-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
            margin-left: 4px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        /* Social Media Bar Above Video */
        .social-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            position: relative;
            z-index: 35;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .social-btn:hover svg {
            transform: scale(1.15) rotate(-5deg);
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .social-btn:active {
            transform: scale(0.95) translateY(0);
        }

        .youtube-btn {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            border-color: rgba(255, 0, 0, 0.3);
        }

        .youtube-btn:hover {
            box-shadow: 0 8px 24px rgba(255, 0, 0, 0.4);
            border-color: rgba(255, 100, 100, 0.5);
        }

        .tiktok-btn {
            background: linear-gradient(135deg, #161823 0%, #000000 100%);
            border-color: rgba(255, 255, 255, 0.15);
            position: relative;
        }

        .tiktok-btn:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            border-color: rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.4);
            border-color: rgba(100, 255, 150, 0.5);
        }

        /* Upcoming Stream Overlay */
        .upcoming-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 35;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .upcoming-overlay.active {
            display: flex;
        }

        .upcoming-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.4);
            transform: scale(1.1);
        }

        .upcoming-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .live-in-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 16px;
            text-shadow: 0 2px 20px rgba(251, 191, 36, 0.5);
            animation: labelPulse 2s ease-in-out infinite;
        }

        @keyframes labelPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .countdown-box {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 14px 18px;
            min-width: 70px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .countdown-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            line-height: 1;
            font-family: 'Inter', system-ui, monospace;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .countdown-item.hidden {
            display: none !important;
        }

        /* Teams VS Section */
        .teams-vs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 24px;
        }

        .team-logo-wrap {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .team-logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vs-text {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.6);
            letter-spacing: 2px;
        }

        .match-time-text {
            margin-top: 16px;
            font-size: 1rem;
            color: #e2e8f0;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 480px) {
            .team-logo-wrap { width: 55px; height: 55px; }
            .vs-text { font-size: 1.1rem; }
            .match-time-text { font-size: 0.9rem; }
        }

        .upcoming-title {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #cbd5e1;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .countdown-value { font-size: 1.5rem; }
            .countdown-item { padding: 10px 12px; min-width: 55px; }
            .live-in-label { font-size: 0.9rem; letter-spacing: 2px; }
            .countdown-box { gap: 8px; }
        }

        @media (max-width: 480px) {
            .social-bar {
                gap: 10px;
                padding: 10px 8px;
            }
            .social-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
                gap: 6px;
            }
            .social-btn svg {
                width: 18px;
                height: 18px;
            }
        }

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBABN4TUkE2z5hfJHIBH1wT51yubP16FZA",

    // DOM Elements

    const centerPlayBtn = document.getElementById('centerPlayBtn');
    const playIcon = document.getElementById('playIconSvg');
    const pauseIcon = document.getElementById('pauseIconSvg');
    const volumeIcon = document.getElementById('volumeIcon');
    const mutedIcon = document.getElementById('mutedIcon');

    // Upcoming Stream Elements
    const upcomingOverlay = document.getElementById('upcomingOverlay');
    const upcomingBg = document.getElementById('upcomingBg');
    const cdDays = document.getElementById('cdDays');
    const cdHours = document.getElementById('cdHours');
    const cdMinutes = document.getElementById('cdMinutes');
    const cdSeconds = document.getElementById('cdSeconds');
    const upcomingTitle = document.getElementById('upcomingTitle');

    const nextStreamRef = ref(db, 'nextStream');
    let countdownInterval = null;
    let nextStreamTime = null;

    let hls = null;
    let isPlaying = true;
    let isMuted = false; // Start unmuted
    let controlsTimeout = null;
    let currentStreamUrl = "";
    let retryCount = 0;
    const maxRetries = 5;
    let isInitialLoad = true;

    // Helper Functions
    function showLoading(show) {
        if (show) {
            loadingOverlay.style.display = 'flex';
            centerPlayOverlay.classList.add('hidden');
            // Remove initial-loading class after first load
            if (!isInitialLoad) {
                loadingOverlay.classList.remove('initial-loading');
            }
        } else {
            loadingOverlay.style.display = 'none';
            if (isInitialLoad) {
                isInitialLoad = false;
            }
        }
    }

    function showCenterPlayButton() {
        centerPlayOverlay.classList.remove('hidden');
    }

    function hideCenterPlayButton() {
        centerPlayOverlay.classList.add('hidden');
    }

    function resetControlsTimer() {
        if (controlsTimeout) clearTimeout(controlsTimeout);
        customControls.classList.remove('hide-controls');
        controlsTimeout = setTimeout(() => {
            customControls.classList.add('hide-controls');
        }, 3500);
    }

    function updatePlayPauseUI() {
        if (isPlaying) {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        } else {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }
    }

    function updateMuteUI() {
        if (isMuted) {
            volumeIcon.style.display = 'none';
            mutedIcon.style.display = 'block';
        } else {
            volumeIcon.style.display = 'block';
            mutedIcon.style.display = 'none';
        }
    }

    // Initialize HLS.js for M3U8 streaming with improved autoplay and low quality start
    function initHLS(url) {
        if (hls) {
            hls.destroy();
        }

        // Set video attributes for autoplay - unmuted (normal behavior)
        video.muted = false;
        video.autoplay = true;
        video.playsInline = true;

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari (native HLS support)
            video.src = url;
            video.load();

            // Stream loaded, show center play button for user to start
            showLoading(false);
            showCenterPlayButton();

        } else if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                backBufferLength: 5,
                maxBufferSize: 0,
                lowLatencyMode: true,
                enableWorker: true,
                startLevel: 0, // Start with lowest quality to reduce buffering
                abrEwmaDefaultEstimate: 500000, // Start with low bandwidth estimate
                abrBandWidthFactor: 0.8,
                abrBandWidthUpFactor: 0.9,
                manifestLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 5000 },
                        errorRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                },
                playlistLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 5000 },
                        errorRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                },
                fragLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 5, retryDelayMs: 1000, maxRetryDelayMs: 5000 },
                        errorRetry: { maxNumRetry: 5, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                }
            });

            hls.attachMedia(video);

            hls.on(Hls.Events.MEDIA_ATTACHED, () => {
                hls.loadSource(url);
            });

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                // Stream ready, show center play button for user to start
                showCenterPlayButton();
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                console.log("HLS Error:", data);
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("Network error, trying to recover...");
                            showLoading(true);
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log("Media error, trying to recover...");
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log("Fatal error, reinitializing...");
                            initHLS(url);
                            break;
                    }
                }
            });

            // Monitor buffer state for loading indicator
            hls.on(Hls.Events.FRAG_BUFFERED, () => {
                if (video.readyState >= 3) {
                    showLoading(false);
                }
            });

        } else {
            console.error("HLS is not supported in this browser.");
            showLoading(false);
        }
        currentStreamUrl = url;
    }

    // Load or reload stream
    function loadStream(url) {
        if (!url || url === currentStreamUrl) return;
        showLoading(true);
        retryCount = 0;
        initHLS(url);
    }


    // Upcoming Stream Countdown Logic
    const dayBox = document.getElementById('dayBox');
    const hourBox = document.getElementById('hourBox');
    const minBox = document.getElementById('minBox');
    const secBox = document.getElementById('secBox');
    const teamAImg = document.getElementById('teamAImg');
    const teamBImg = document.getElementById('teamBImg');
    const matchTimeText = document.getElementById('matchTimeText');

    function updateCountdown() {
        if (!nextStreamTime) return;
        const now = new Date().getTime();
        const distance = nextStreamTime - now;

        if (distance <= 0) {
            hideUpcomingOverlay();
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        if (days > 0) {
            dayBox.classList.remove('hidden');
            cdDays.innerText = String(days).padStart(2, '0');
        } else {
            dayBox.classList.add('hidden');
        }

        cdHours.innerText = String(hours).padStart(2, '0');
        cdMinutes.innerText = String(minutes).padStart(2, '0');
        cdSeconds.innerText = String(seconds).padStart(2, '0');
    }

    function showUpcomingOverlay(thumbnail) {
        upcomingOverlay.classList.add('active');
        centerPlayOverlay.classList.add('hidden');
        customControls.classList.add('hide-controls');
        if (thumbnail) {
            upcomingBg.style.backgroundImage = `url(${thumbnail})`;
        }
        if (!countdownInterval) {
            countdownInterval = setInterval(updateCountdown, 1000);
            updateCountdown();
        }
    }

    function hideUpcomingOverlay() {
        upcomingOverlay.classList.remove('active');
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
    }

    // Listen for next stream schedule
    onValue(nextStreamRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.time) {
            const streamDate = new Date(data.time).getTime();
            const now = new Date().getTime();

            if (streamDate > now) {
                nextStreamTime = streamDate;
                showUpcomingOverlay(data.thumbnail);
                if (data.thumbnail) upcomingBg.style.backgroundImage = `url(${data.thumbnail})`;

                // Update team logos if provided
                if (data.teamA && teamAImg) teamAImg.src = data.teamA;
                if (data.teamB && teamBImg) teamBImg.src = data.teamB;
                if (data.matchTime && matchTimeText) matchTimeText.innerText = data.matchTime;
            } else {
                hideUpcomingOverlay();
            }
        } else {
            hideUpcomingOverlay();
        }
    });

    // Firebase Listener for Stream URL
    onValue(streamUrlRef, (snapshot) => {
        const url = snapshot.val();
        if (url && url !== currentStreamUrl) {
            loadStream(url);
        }
    });

    // Chat Functionality with Auto-Delete after 24 hours
    const username = "Viewer_" + Math.floor(Math.random() * 900 + 100);
    const chatContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');

    const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000; // 24 hours in milliseconds

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function appendMessage(user, text, msgId, timestamp) {
        const div = document.createElement('div');
        div.className = 'message-bubble';
        div.setAttribute('data-msg-id', msgId);
        div.setAttribute('data-timestamp', timestamp);
        div.innerHTML = `<strong>${escapeHtml(user)}</strong> ${escapeHtml(text)}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Function to check and delete old messages (older than 24 hours)
    function cleanupOldMessages() {
        const now = Date.now();
        const messages = chatContainer.querySelectorAll('.message-bubble');

        messages.forEach(msg => {
            const timestamp = parseInt(msg.getAttribute('data-timestamp')) || 0;
            if (now - timestamp > TWENTY_FOUR_HOURS) {
                msg.remove();
            }
        });
    }

    // Run cleanup every hour
    setInterval(cleanupOldMessages, 60 * 60 * 1000);

    onChildAdded(chatRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // Check if message is older than 24 hours
        const msgTimestamp = data.timestamp || Date.now();
        const now = Date.now();

        if (now - msgTimestamp > TWENTY_FOUR_HOURS) {
            // Delete old message from database
            const msgRef = ref(db, `chat/messages/${snapshot.key}`);
            set(msgRef, null);
            return;
        }

        appendMessage(data.username, data.text, snapshot.key, msgTimestamp);
    });

    function sendMessage() {
        const msg = chatInput.value.trim();
        if (!msg) return;
        const newMsgRef = push(chatRef);
        set(newMsgRef, { 
            username: username, 
            text: msg, 
            timestamp: serverTimestamp() 
        });
        chatInput.value = '';
    }

    // Also clean up old messages in database periodically
    function cleanupDatabaseMessages() {
        const now = Date.now();
        onValue(chatRef, (snapshot) => {
            const messages = snapshot.val();
            if (!messages) return;

            Object.keys(messages).forEach(key => {
                const msg = messages[key];
                const msgTimestamp = msg.timestamp || 0;
                if (now - msgTimestamp > TWENTY_FOUR_HOURS) {
                    const msgRef = ref(db, `chat/messages/${key}`);
                    set(msgRef, null);
                }
            });
        }, { onlyOnce: true });
    }

    // Run database cleanup every 6 hours
    setInterval(cleanupDatabaseMessages, 6 * 60 * 60 * 1000);
    // Also run once on load
    setTimeout(cleanupDatabaseMessages, 5000);

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Live Viewer Count (Presence)
    const viewerId = Math.random().toString(36).substring(2) + Date.now();
    const myViewerRef = ref(db, `activeViewers/${viewerId}`);
    onDisconnect(myViewerRef).remove();
    set(myViewerRef, { timestamp: serverTimestamp() });
    onValue(ref(db, 'activeViewers'), (snap) => {
        const viewers = snap.val() || {};
        const count = Object.keys(viewers).length;
        document.getElementById('viewerCountDisplay').innerText = count;
    });

    // Controls visibility state
    let controlsVisible = false;
    let controlsClickTimer = null;

    // Improved controls toggle function
    function toggleControls(show) {
        if (show) {
            customControls.classList.remove('hide-controls');
            controlsVisible = true;
            // Auto hide after 4 seconds if not clicked again
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!controlsClickTimer) { // Only hide if not currently clicking a control
                    customControls.classList.add('hide-controls');
                    controlsVisible = false;
                }
            }, 4000);
        } else {
            customControls.classList.add('hide-controls');
            controlsVisible = false;
        }
    }

    // Video stage click handler - first click shows controls, second click hides
    videoStage.addEventListener('click', (e) => {
        // If clicking on a control button, let it handle the click
        if (e.target.closest('.ctrl-btn')) return;

        if (!controlsVisible) {
            toggleControls(true);
        } else {
            toggleControls(false);
        }
    });

    // Custom Control Event Listeners - show controls on first click, action on second
    function handleControlClick(e, action) {
        e.stopPropagation();

        if (!controlsVisible) {
            // First click - just show controls
            toggleControls(true);
            return;
        }

        // Second click - perform the action
        controlsClickTimer = setTimeout(() => {
            controlsClickTimer = null;
        }, 100);

        action();
        resetControlsTimer();
    }

    playPauseBtn.addEventListener('click', (e) => {
        handleControlClick(e, () => {
            if (!video) return;
            if (video.paused) {
                video.play().then(() => {
                    isPlaying = true;
                    updatePlayPauseUI();
                }).catch(err => {
                    console.log("Play failed:", err);
                });
            } else {
                video.pause();
                isPlaying = false;
                updatePlayPauseUI();
            }
        });
    });

    muteBtn.addEventListener('click', (e) => {
        handleControlClick(e, () => {
            if (!video) return;
            video.muted = !video.muted;
            isMuted = video.muted;
            updateMuteUI();
        });
    });

    fullscreenBtn.addEventListener('click', async (e) => {
        handleControlClick(e, async () => {
            const elem = videoStage;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    await elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                }
                try {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape');
                    }
                } catch(err) {
                    console.log("Orientation lock not supported:", err);
                }
            } else {
                await document.exitFullscreen();
                try {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                } catch(e) {}
            }
        });
    });

    // Center play button click handler
    centerPlayBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        hideCenterPlayButton();
        video.play().then(() => {
            isPlaying = true;
            updatePlayPauseUI();
            toggleControls(true);
        }).catch(err => {
            console.log("Play failed:", err);
            showCenterPlayButton();
        });
    });

    centerPlayOverlay.addEventListener('click', (e) => {
        if (e.target === centerPlayOverlay || e.target === centerPlayBtn) {
            centerPlayBtn.click();
        }
    });

    video.addEventListener('play', () => {
        isPlaying = true;
        updatePlayPauseUI();
        showLoading(false);
        hideCenterPlayButton();
    });

    video.addEventListener('pause', () => {
        isPlaying = false;
        updatePlayPauseUI();
    });

    video.addEventListener('volumechange', () => {
        isMuted = video.muted;
        updateMuteUI();
    });

    video.addEventListener('waiting', () => {
        showLoading(true);
    });

    video.addEventListener('playing', () => {
        showLoading(false);
    });

    video.addEventListener('canplay', () => {
        if (video.readyState >= 3) {
            showLoading(false);
        }
    });

    // Initial UI State - Show loading first, then center play button
    video.muted = false;
    isMuted = false;
    controlsVisible = false;
    customControls.classList.add('hide-controls');
    updateMuteUI();
    updatePlayPauseUI();
    showLoading(true);
</script>
</body>
</html>
