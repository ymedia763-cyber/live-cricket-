<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS LIVE · M3U8 Stream Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0c12 0%, #1a1d29 50%, #0a0c12 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            border-radius: 28px;
            background: rgba(10, 14, 24, 0.95);
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(59, 130, 246, 0.15),
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            animation: containerGlow 4s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 80px rgba(59, 130, 246, 0.25), 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); }
        }

        /* Video Stage */
        .video-stage {
            position: relative;
            background: linear-gradient(145deg, #000 0%, #0a0e18 100%);
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            transition: transform 0.3s ease;
        }

        /* Custom Controls Overlay - Simplified */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: transparent;
            padding: 12px 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .ctrl-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            stroke: #f1f5f9;
            stroke-width: 1.8;
            fill: none;
            transition: all 0.2s ease;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .live-badge {
            background: linear-gradient(135deg, #e50914 0%, #ff1744 100%);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            margin-left: 4px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            animation: livePulse 2s ease-in-out infinite;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes livePulse {
            0%, 100% { 
                box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 25px rgba(229, 9, 20, 0.8);
                transform: scale(1.02);
            }
        }

        .controls-right {
            display: flex;
            gap: 12px;
        }

        .hide-controls {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* Enhanced Loading Overlay with Three Dots - Transparent Background */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 25;
            gap: 20px;
            backdrop-filter: blur(3px);
        }

        .loading-overlay.initial-loading {
            background: linear-gradient(135deg, #03060c 0%, #0a0e18 100%);
            backdrop-filter: none;
        }

        .loading-overlay.initial-loading::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .three-dots-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            animation: dotBounce 1.4s ease-in-out infinite both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        .dot:nth-child(3) { animation-delay: 0s; }

        @keyframes dotBounce {
            0%, 80%, 100% { 
                transform: scale(0.6);
                opacity: 0.5;
            }
            40% { 
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.9);
            }
        }

        /* Chat Panel */
        .chat-panel {
            padding: 14px 16px 20px;
            background: rgba(10, 14, 24, 0.8);
            border-top: 1px solid rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(10px);
        }

        .viewer-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #11161f 0%, #1a1f2e 100%);
            border-radius: 50px;
            padding: 6px 14px;
            width: fit-content;
            margin-bottom: 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .viewer-stats:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .eye-icon svg {
            width: 16px;
            height: 16px;
            stroke: #94a3b8;
            filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.3));
        }

        .viewer-count {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e2e8f0;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .live-viewers {
            font-size: 0.7rem;
            color: #7e8ba3;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .chat-header h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chat-messages {
            background: linear-gradient(145deg, #0f131f 0%, #151a28 100%);
            border-radius: 20px;
            height: 240px;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .message-bubble {
            background: linear-gradient(135deg, #1a1f2e 0%, #252b3d 100%);
            padding: 8px 14px;
            border-radius: 24px;
            max-width: 90%;
            width: fit-content;
            font-size: 0.8rem;
            color: #eef2ff;
            border-left: 3px solid #3b82f6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-bubble:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateX(5px);
        }

        .message-bubble strong {
            color: #60a5fa;
            font-weight: 600;
            margin-right: 6px;
            font-size: 0.8rem;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            align-items: center;
            background: linear-gradient(145deg, #0f131f 0%, #151a28 100%);
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .chat-input-area:focus-within {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: #5b6e8c;
        }

        .send-btn {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border: none;
            border-radius: 32px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .send-btn svg {
            width: 14px;
            height: 14px;
            stroke: white;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.6);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
        }

        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.5);
        }

        @media (max-width: 480px) {
            .ctrl-btn svg {
                width: 20px;
                height: 20px;
            }
            .live-badge {
                font-size: 10px;
                padding: 3px 10px;
            }
            .custom-controls {
                padding: 10px 12px 14px;
            }
            .chat-messages {
                height: 200px;
            }
            .dot {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="video-stage" id="videoStage">
        <video id="videoPlayer" playsinline muted autoplay></video>
        <div class="custom-controls" id="customControls">
            <div class="controls-left">
                <button class="ctrl-btn" id="playPauseBtn">
                    <svg viewBox="0 0 24 24" id="playIconSvg">
                        <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
                    </svg>
                    <svg viewBox="0 0 24 24" id="pauseIconSvg" style="display: none;">
                        <rect x="6" y="4" width="4" height="16" fill="currentColor"/>
                        <rect x="14" y="4" width="4" height="16" fill="currentColor"/>
                    </svg>
                </button>
                <button class="ctrl-btn" id="muteBtn">
                    <svg viewBox="0 0 24 24" id="volumeIcon" fill="none" stroke="currentColor">
                        <path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/>
                        <path d="M16 8a5 5 0 0 1 0 8"/>
                        <path d="M19 5a9 9 0 0 1 0 14"/>
                    </svg>
                    <svg viewBox="0 0 24 24" id="mutedIcon" style="display: none;" fill="none" stroke="currentColor">
                        <path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/>
                        <line x1="18" y1="6" x2="22" y2="10"/>
                        <line x1="22" y1="6" x2="18" y2="10"/>
                    </svg>
                </button>
                <div class="live-badge">LIVE</div>
            </div>
            <div class="controls-right">
                <button class="ctrl-btn" id="fullscreenBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" stroke="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="loading-overlay initial-loading" id="loadingOverlay">
            <div class="three-dots-container">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="viewer-stats">
            <span class="eye-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
            <span class="viewer-count" id="viewerCountDisplay">0</span>
            <span class="live-viewers">watching now</span>
        </div>
        <div class="chat-header"><h4>LIVE CHAT</h4><span style="font-size: 9px; color:#5b6e8c; text-transform: uppercase; letter-spacing: 1px;">realtime</span></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your message ..." autocomplete="off">
            <button class="send-btn" id="sendChatBtn"><svg viewBox="0 0 24 24" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg><span>Send</span></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, onChildAdded, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBABN4TUkE2z5hfJHIBH1wT51yubP16FZA",
        authDomain: "chat-283ed.firebaseapp.com",
        databaseURL: "https://chat-283ed-default-rtdb.firebaseio.com",
        projectId: "chat-283ed",
        storageBucket: "chat-283ed.firebasestorage.app",
        messagingSenderId: "669885432854",
        appId: "1:669885432854:web:ba6185cdbbcc6f485ba137"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const streamUrlRef = ref(db, 'liveStream/url');
    const chatRef = ref(db, 'chat/messages');
    const viewersRef = ref(db, 'activeViewers');

    // DOM Elements
    const video = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const videoStage = document.getElementById('videoStage');
    const customControls = document.getElementById('customControls');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const playIcon = document.getElementById('playIconSvg');
    const pauseIcon = document.getElementById('pauseIconSvg');
    const volumeIcon = document.getElementById('volumeIcon');
    const mutedIcon = document.getElementById('mutedIcon');

    let hls = null;
    let isPlaying = true;
    let isMuted = false; // Start unmuted
    let controlsTimeout = null;
    let currentStreamUrl = "";
    let retryCount = 0;
    const maxRetries = 5;
    let isInitialLoad = true;

    // Helper Functions
    function showLoading(show) {
        if (show) {
            loadingOverlay.style.display = 'flex';
            // Remove initial-loading class after first load
            if (!isInitialLoad) {
                loadingOverlay.classList.remove('initial-loading');
            }
        } else {
            loadingOverlay.style.display = 'none';
            if (isInitialLoad) {
                isInitialLoad = false;
            }
        }
    }

    function resetControlsTimer() {
        if (controlsTimeout) clearTimeout(controlsTimeout);
        customControls.classList.remove('hide-controls');
        controlsTimeout = setTimeout(() => {
            customControls.classList.add('hide-controls');
        }, 3500);
    }

    function updatePlayPauseUI() {
        if (isPlaying) {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        } else {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }
    }

    function updateMuteUI() {
        if (isMuted) {
            volumeIcon.style.display = 'none';
            mutedIcon.style.display = 'block';
        } else {
            volumeIcon.style.display = 'block';
            mutedIcon.style.display = 'none';
        }
    }

    // Initialize HLS.js for M3U8 streaming with improved autoplay and low quality start
    function initHLS(url) {
        if (hls) {
            hls.destroy();
        }

        // Set video attributes for autoplay - unmuted
        video.muted = false;
        video.autoplay = true;
        video.playsInline = true;

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari (native HLS support)
            video.src = url;
            video.load();

            // Force play on loadedmetadata with retry logic
            const attemptPlay = () => {
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        showLoading(false);
                        isPlaying = true;
                        updatePlayPauseUI();
                    }).catch(error => {
                        console.log("Auto-play prevented, retrying...", error);
                        setTimeout(attemptPlay, 500);
                    });
                }
            };

            video.addEventListener('loadedmetadata', attemptPlay);
            video.addEventListener('canplay', attemptPlay);

        } else if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                backBufferLength: 5,
                maxBufferSize: 0,
                lowLatencyMode: true,
                enableWorker: true,
                startLevel: 0, // Start with lowest quality to reduce buffering
                abrEwmaDefaultEstimate: 500000, // Start with low bandwidth estimate
                abrBandWidthFactor: 0.8,
                abrBandWidthUpFactor: 0.9,
                manifestLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 5000 },
                        errorRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                },
                playlistLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 5000 },
                        errorRetry: { maxNumRetry: 3, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                },
                fragLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 5, retryDelayMs: 1000, maxRetryDelayMs: 5000 },
                        errorRetry: { maxNumRetry: 5, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                }
            });

            hls.attachMedia(video);

            hls.on(Hls.Events.MEDIA_ATTACHED, () => {
                hls.loadSource(url);
            });

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                // Force autoplay with retry logic
                const attemptPlay = () => {
                    if (retryCount >= maxRetries) {
                        console.log("Max retries reached, showing manual play");
                        isPlaying = false;
                        updatePlayPauseUI();
                        return;
                    }

                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            isPlaying = true;
                            updatePlayPauseUI();
                            retryCount = 0;
                        }).catch(error => {
                            console.log("Auto-play attempt failed, retrying...", error);
                            retryCount++;
                            setTimeout(attemptPlay, 800);
                        });
                    }
                };
                attemptPlay();
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                console.log("HLS Error:", data);
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("Network error, trying to recover...");
                            showLoading(true);
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log("Media error, trying to recover...");
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log("Fatal error, reinitializing...");
                            initHLS(url);
                            break;
                    }
                }
            });

            // Monitor buffer state for loading indicator
            hls.on(Hls.Events.FRAG_BUFFERED, () => {
                if (video.readyState >= 3) {
                    showLoading(false);
                }
            });

        } else {
            console.error("HLS is not supported in this browser.");
            showLoading(false);
        }
        currentStreamUrl = url;
    }

    // Load or reload stream
    function loadStream(url) {
        if (!url || url === currentStreamUrl) return;
        showLoading(true);
        retryCount = 0;
        initHLS(url);
    }

    // Firebase Listener for Stream URL
    onValue(streamUrlRef, (snapshot) => {
        const url = snapshot.val();
        if (url && url !== currentStreamUrl) {
            loadStream(url);
        }
    });

    // Chat Functionality
    const username = "Viewer_" + Math.floor(Math.random() * 900 + 100);
    const chatContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function appendMessage(user, text) {
        const div = document.createElement('div');
        div.className = 'message-bubble';
        div.innerHTML = `<strong>${escapeHtml(user)}</strong> ${escapeHtml(text)}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    onChildAdded(chatRef, (snapshot) => {
        const data = snapshot.val();
        if (data) appendMessage(data.username, data.text);
    });

    function sendMessage() {
        const msg = chatInput.value.trim();
        if (!msg) return;
        const newMsgRef = push(chatRef);
            set(newMsgRef, { username: username, text: msg, timestamp: serverTimestamp() });
        chatInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Live Viewer Count (Presence)
    const viewerId = Math.random().toString(36).substring(2) + Date.now();
    const myViewerRef = ref(db, `activeViewers/${viewerId}`);
    onDisconnect(myViewerRef).remove();
    set(myViewerRef, { timestamp: serverTimestamp() });
    onValue(ref(db, 'activeViewers'), (snap) => {
        const viewers = snap.val() || {};
        const count = Object.keys(viewers).length;
        document.getElementById('viewerCountDisplay').innerText = count;
    });

    // Custom Control Event Listeners
    playPauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!video) return;
        if (isPlaying) {
            video.pause();
            isPlaying = false;
        } else {
            video.play().then(() => {
                isPlaying = true;
            }).catch(err => {
                console.log("Play failed:", err);
            });
        }
        updatePlayPauseUI();
        resetControlsTimer();
    });

    muteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!video) return;
        if (isMuted) {
            video.muted = false;
            isMuted = false;
        } else {
            video.muted = true;
            isMuted = true;
        }
        updateMuteUI();
        resetControlsTimer();
    });

    fullscreenBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const elem = videoStage;
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) {
                await elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(err) {
                console.log("Orientation lock not supported:", err);
            }
        } else {
            await document.exitFullscreen();
            try {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            } catch(e) {}
        }
        resetControlsTimer();
    });

    video.addEventListener('play', () => {
        isPlaying = true;
        updatePlayPauseUI();
        resetControlsTimer();
        showLoading(false);
    });

    video.addEventListener('pause', () => {
        isPlaying = false;
        updatePlayPauseUI();
        resetControlsTimer();
    });

    video.addEventListener('volumechange', () => {
        isMuted = video.muted;
        updateMuteUI();
    });

    video.addEventListener('waiting', () => {
        showLoading(true);
    });

    video.addEventListener('playing', () => {
        showLoading(false);
    });

    video.addEventListener('canplay', () => {
        if (video.readyState >= 3) {
            showLoading(false);
        }
    });

    videoStage.addEventListener('click', (e) => {
        resetControlsTimer();
    });

    // Initial UI State - Unmuted
    video.muted = false;
    isMuted = false;
    updateMuteUI();
    updatePlayPauseUI();
    showLoading(true);
</script>
</body>
</html>
