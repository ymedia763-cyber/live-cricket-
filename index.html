<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS LIVE · Pure Custom Player</title>
    <style>
        /* آپ کا پرانا CSS ویسے ہی رہے گا */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #07090f; font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .app-container { max-width: 560px; width: 100%; margin: 0 auto; border-radius: 32px; background: #0a0e18; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .video-stage { position: relative; background: #000; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; }
        #youtube-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .click-catcher { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent; cursor: pointer; }
        .custom-controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); padding: 12px 16px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 20; transition: opacity 0.25s ease; }
        .controls-left { display: flex; align-items: center; gap: 12px; }
        .ctrl-btn { background: rgba(0,0,0,0.65); border: none; padding: 6px; cursor: pointer; border-radius: 40px; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn svg { width: 20px; height: 20px; stroke: #f1f5f9; stroke-width: 1.8; fill: none; }
        .live-badge { background: #e50914; padding: 4px 10px; border-radius: 30px; font-size: 10px; font-weight: 700; color: white; text-transform: uppercase; }
        .hide-controls { opacity: 0; pointer-events: none; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #03060c; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 25; gap: 12px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(37,99,235,0.3); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .interaction-panel { padding: 14px 16px 20px; background: #0a0e18; border-top: 1px solid #1e2438; }
        .viewer-stats { display: flex; align-items: center; gap: 8px; background: #11161f; border-radius: 50px; padding: 6px 14px; width: fit-content; margin-bottom: 16px; color: #e2e8f0; font-size: 0.9rem; }
        .chat-messages { background: #0f131f; border-radius: 20px; height: 240px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .message-bubble { background: #1a1f2e; padding: 6px 12px; border-radius: 24px; font-size: 0.8rem; color: #eef2ff; border-left: 2px solid #3b82f6; }
        .chat-input-area { display: flex; gap: 8px; background: #0f131f; border-radius: 40px; padding: 4px 16px; border: 1px solid #2a2f42; }
        .chat-input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px 0; }
        .send-btn { background: #2563eb; border: none; border-radius: 32px; padding: 6px 16px; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="video-stage" id="videoStage">
        <div id="youtube-player"></div>
        <div class="click-catcher" id="clickCatcher"></div>
        <div class="custom-controls-overlay" id="customControls">
            <div class="controls-left">
                <button class="ctrl-btn" id="playPauseBtn">
                    <svg viewBox="0 0 24 24" id="playIconSvg"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
                    <svg viewBox="0 0 24 24" id="pauseIconSvg" style="display: none;"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
                </button>
                <button class="ctrl-btn" id="muteBtn">
                    <svg viewBox="0 0 24 24" id="volumeIcon" fill="none" stroke="currentColor"><path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/><path d="M16 8a5 5 0 0 1 0 8"/></svg>
                    <svg viewBox="0 0 24 24" id="mutedIcon" style="display: none;" fill="none" stroke="currentColor"><path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/><line x1="18" y1="6" x2="22" y2="10"/></svg>
                </button>
                <div class="live-badge">LIVE</div>
            </div>
            <div class="controls-right">
                <button class="ctrl-btn" id="fullscreenBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
            </div>
        </div>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">OPTIMIZING STREAM...</div>
        </div>
    </div>

    <div class="interaction-panel">
        <div class="viewer-stats">
            <span class="viewer-count" id="viewerCountDisplay">0</span>
            <span>watching now</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type message..." autocomplete="off">
            <button class="send-btn" id="sendChatBtn">Send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, onChildAdded, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBABN4TUkE2z5hfJHIBH1wT51yubP16FZA",
        authDomain: "chat-283ed.firebaseapp.com",
        databaseURL: "https://chat-283ed-default-rtdb.firebaseio.com",
        projectId: "chat-283ed",
        storageBucket: "chat-283ed.firebasestorage.app",
        messagingSenderId: "669885432854",
        appId: "1:669885432854:web:ba6185cdbbcc6f485ba137"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const streamUrlRef = ref(db, 'liveStream/url');

    function extractVideoId(url) {
        if (!url) return "dQw4w9WgXcQ";
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|live\/|shorts\/))([\w-]{11})/);
        return match ? match[1] : "dQw4w9WgXcQ";
    }

    let player = null;
    let isPlaying = true;
    let isMuted = false;

    window.onYouTubeIframeAPIReady = () => {
        onValue(streamUrlRef, (snapshot) => {
            const vidId = extractVideoId(snapshot.val());
            if (!player) {
                player = new YT.Player('youtube-player', {
                    host: 'https://www.youtube-nocookie.com', // کم اشتہارات اور بہتر پرائیویسی کے لیے
                    videoId: vidId,
                    playerVars: { 
                        autoplay: 1, 
                        controls: 0, 
                        showinfo: 0, 
                        rel: 0, 
                        iv_load_policy: 3, 
                        modestbranding: 1,
                        playsinline: 1,
                        enablejsapi: 1,
                        origin: window.location.origin,
                        widget_referrer: window.location.href
                    },
                    events: {
                        onReady: (e) => {
                            e.target.playVideo();
                            document.getElementById('loadingOverlay').style.display = 'none';
                        },
                        onStateChange: (e) => {
                            if (e.data === YT.PlayerState.BUFFERING) document.getElementById('loadingOverlay').style.display = 'flex';
                            else document.getElementById('loadingOverlay').style.display = 'none';
                        }
                    }
                });
            } else {
                player.loadVideoById(vidId);
            }
        });
    };

    // YouTube API load
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    // Controls Logic
    document.getElementById('playPauseBtn').onclick = () => {
        if (isPlaying) { player.pauseVideo(); isPlaying = false; }
        else { player.playVideo(); isPlaying = true; }
        document.getElementById('playIconSvg').style.display = isPlaying ? 'none' : 'block';
        document.getElementById('pauseIconSvg').style.display = isPlaying ? 'block' : 'none';
    };

    document.getElementById('muteBtn').onclick = () => {
        if (isMuted) { player.unMute(); isMuted = false; }
        else { player.mute(); isMuted = true; }
        document.getElementById('volumeIcon').style.display = isMuted ? 'none' : 'block';
        document.getElementById('mutedIcon').style.display = isMuted ? 'block' : 'none';
    };

    document.getElementById('fullscreenBtn').onclick = () => {
        const stage = document.getElementById('videoStage');
        if (!document.fullscreenElement) stage.requestFullscreen();
        else document.exitFullscreen();
    };

    // Chat and Viewers functionality remains same as your Firebase setup...
</script>
</body>
</html>
