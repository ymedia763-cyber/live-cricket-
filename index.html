<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS LIVE · M3U8 Stream Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .app-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            border-radius: 28px;
            background: #0a0e18;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        /* Video Stage */
        .video-stage {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Custom Controls Overlay */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 80%, transparent 100%);
            padding: 12px 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            transition: opacity 0.25s ease;
            opacity: 1;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .ctrl-btn {
            background: rgba(0,0,0,0.65);
            border: none;
            padding: 8px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.1s;
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
            stroke: #f1f5f9;
            stroke-width: 1.8;
            fill: none;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
            background: #3b82f6;
        }

        .live-badge {
            background: #e50914;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            margin-left: 4px;
        }

        .controls-right {
            display: flex;
            gap: 12px;
        }

        .hide-controls {
            opacity: 0;
            pointer-events: none;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #03060c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 25;
            gap: 12px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(37,99,235,0.2);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-text {
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
        }

        /* Chat Panel */
        .chat-panel {
            padding: 14px 16px 20px;
            background: #0a0e18;
            border-top: 1px solid #1e2438;
        }

        .viewer-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #11161f;
            border-radius: 50px;
            padding: 6px 14px;
            width: fit-content;
            margin-bottom: 16px;
        }

        .eye-icon svg {
            width: 16px;
            height: 16px;
            stroke: #94a3b8;
        }

        .viewer-count {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e2e8f0;
        }

        .live-viewers {
            font-size: 0.7rem;
            color: #7e8ba3;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .chat-header h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e6;
        }

        .chat-messages {
            background: #0f131f;
            border-radius: 20px;
            height: 240px;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .message-bubble {
            background: #1a1f2e;
            padding: 8px 14px;
            border-radius: 24px;
            max-width: 90%;
            width: fit-content;
            font-size: 0.8rem;
            color: #eef2ff;
            border-left: 2px solid #3b82f6;
        }

        .message-bubble strong {
            color: #60a5fa;
            font-weight: 600;
            margin-right: 6px;
            font-size: 0.8rem;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #0f131f;
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
            border: 1px solid #2a2f42;
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .send-btn {
            background: #2563eb;
            border: none;
            border-radius: 32px;
            padding: 6px 16px;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .send-btn svg {
            width: 14px;
            height: 14px;
            stroke: white;
        }

        .send-btn:active {
            background: #1d4ed8;
            transform: scale(0.96);
        }

        @media (max-width: 480px) {
            .ctrl-btn svg {
                width: 20px;
                height: 20px;
            }
            .live-badge {
                font-size: 10px;
                padding: 3px 8px;
            }
            .custom-controls {
                padding: 10px 12px 14px;
            }
            .chat-messages {
                height: 200px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="video-stage" id="videoStage">
        <video id="videoPlayer" playsinline></video>
        <div class="custom-controls" id="customControls">
            <div class="controls-left">
                <button class="ctrl-btn" id="playPauseBtn">
                    <svg viewBox="0 0 24 24" id="playIconSvg">
                        <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
                    </svg>
                    <svg viewBox="0 0 24 24" id="pauseIconSvg" style="display: none;">
                        <rect x="6" y="4" width="4" height="16" fill="currentColor"/>
                        <rect x="14" y="4" width="4" height="16" fill="currentColor"/>
                    </svg>
                </button>
                <button class="ctrl-btn" id="muteBtn">
                    <svg viewBox="0 0 24 24" id="volumeIcon" fill="none" stroke="currentColor">
                        <path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/>
                        <path d="M16 8a5 5 0 0 1 0 8"/>
                        <path d="M19 5a9 9 0 0 1 0 14"/>
                    </svg>
                    <svg viewBox="0 0 24 24" id="mutedIcon" style="display: none;" fill="none" stroke="currentColor">
                        <path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5l-5 4H4a1 1 0 0 0-1 1z"/>
                        <line x1="18" y1="6" x2="22" y2="10"/>
                        <line x1="22" y1="6" x2="18" y2="10"/>
                    </svg>
                </button>
                <div class="live-badge">LIVE</div>
            </div>
            <div class="controls-right">
                <button class="ctrl-btn" id="fullscreenBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" stroke="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">BUFFERING STREAM ...</div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="viewer-stats">
            <span class="eye-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
            <span class="viewer-count" id="viewerCountDisplay">0</span>
            <span class="live-viewers">watching now</span>
        </div>
        <div class="chat-header"><h4>LIVE CHAT</h4><span style="font-size: 9px; color:#5b6e8c;">realtime</span></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your message ..." autocomplete="off">
            <button class="send-btn" id="sendChatBtn"><svg viewBox="0 0 24 24" stroke="currentColor"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg><span>Send</span></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, onChildAdded, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBABN4TUkE2z5hfJHIBH1wT51yubP16FZA",
        authDomain: "chat-283ed.firebaseapp.com",
        databaseURL: "https://chat-283ed-default-rtdb.firebaseio.com",
        projectId: "chat-283ed",
        storageBucket: "chat-283ed.firebasestorage.app",
        messagingSenderId: "669885432854",
        appId: "1:669885432854:web:ba6185cdbbcc6f485ba137"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const streamUrlRef = ref(db, 'liveStream/url');
    const chatRef = ref(db, 'chat/messages');
    const viewersRef = ref(db, 'activeViewers');

    // DOM Elements
    const video = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const videoStage = document.getElementById('videoStage');
    const customControls = document.getElementById('customControls');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const playIcon = document.getElementById('playIconSvg');
    const pauseIcon = document.getElementById('pauseIconSvg');
    const volumeIcon = document.getElementById('volumeIcon');
    const mutedIcon = document.getElementById('mutedIcon');

    let hls = null;
    let isPlaying = true;
    let isMuted = false;
    let controlsTimeout = null;
    let currentStreamUrl = "";

    // Helper Functions
    function showLoading(show) {
        loadingOverlay.style.display = show ? 'flex' : 'none';
    }

    function resetControlsTimer() {
        if (controlsTimeout) clearTimeout(controlsTimeout);
        customControls.classList.remove('hide-controls');
        controlsTimeout = setTimeout(() => {
            customControls.classList.add('hide-controls');
        }, 3500);
    }

    function updatePlayPauseUI() {
        if (isPlaying) {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        } else {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }
    }

    function updateMuteUI() {
        if (isMuted) {
            volumeIcon.style.display = 'none';
            mutedIcon.style.display = 'block';
        } else {
            volumeIcon.style.display = 'block';
            mutedIcon.style.display = 'none';
        }
    }

    // Initialize HLS.js for M3U8 streaming
    function initHLS(url) {
        if (hls) {
            hls.destroy();
        }
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari (native HLS support)
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
                showLoading(false);
            });
        } else if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 20,
                backBufferLength: 2,
                maxBufferSize: 0,
                lowLatencyMode: true,
                enableWorker: true,
                manifestLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 2, retryDelayMs: 0, maxRetryDelayMs: 0 },
                        errorRetry: { maxNumRetry: 2, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                },
                playlistLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 2, retryDelayMs: 0, maxRetryDelayMs: 0 },
                        errorRetry: { maxNumRetry: 2, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                },
                fragLoadPolicy: {
                    default: {
                        maxTimeToFirstByteMs: 10000,
                        maxLoadTimeMs: 20000,
                        timeoutRetry: { maxNumRetry: 4, retryDelayMs: 0, maxRetryDelayMs: 0 },
                        errorRetry: { maxNumRetry: 4, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
                    }
                }
            });
            hls.attachMedia(video);
            hls.on(Hls.Events.MEDIA_ATTACHED, () => {
                hls.loadSource(url);
                showLoading(false);
            });
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(e => console.log("Auto-play prevented:", e));
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hls.recoverMediaError();
                            break;
                        default:
                            initHLS(url);
                            break;
                    }
                }
            });
        } else {
            console.error("HLS is not supported in this browser.");
            showLoading(false);
        }
        currentStreamUrl = url;
    }

    // Load or reload stream
    function loadStream(url) {
        if (!url || url === currentStreamUrl) return;
        showLoading(true);
        initHLS(url);
    }

    // Firebase Listener for Stream URL
    onValue(streamUrlRef, (snapshot) => {
        const url = snapshot.val();
        if (url && url !== currentStreamUrl) {
            loadStream(url);
        }
    });

    // Chat Functionality
    const username = "Viewer_" + Math.floor(Math.random() * 900 + 100);
    const chatContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function appendMessage(user, text) {
        const div = document.createElement('div');
        div.className = 'message-bubble';
        div.innerHTML = `<strong>${escapeHtml(user)}</strong> ${escapeHtml(text)}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    onChildAdded(chatRef, (snapshot) => {
        const data = snapshot.val();
        if (data) appendMessage(data.username, data.text);
    });

    function sendMessage() {
        const msg = chatInput.value.trim();
        if (!msg) return;
        const newMsgRef = push(chatRef);
        set(newMsgRef, { username: username, text: msg, timestamp: serverTimestamp() });
        chatInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Live Viewer Count (Presence)
    const viewerId = Math.random().toString(36).substring(2) + Date.now();
    const myViewerRef = ref(db, `activeViewers/${viewerId}`);
    onDisconnect(myViewerRef).remove();
    set(myViewerRef, { timestamp: serverTimestamp() });
    onValue(ref(db, 'activeViewers'), (snap) => {
        const viewers = snap.val() || {};
        const count = Object.keys(viewers).length;
        document.getElementById('viewerCountDisplay').innerText = count;
    });

    // Custom Control Event Listeners
    playPauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!video) return;
        if (isPlaying) {
            video.pause();
            isPlaying = false;
        } else {
            video.play();
            isPlaying = true;
        }
        updatePlayPauseUI();
        resetControlsTimer();
    });

    muteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!video) return;
        if (isMuted) {
            video.muted = false;
            isMuted = false;
        } else {
            video.muted = true;
            isMuted = true;
        }
        updateMuteUI();
        resetControlsTimer();
    });

    fullscreenBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const elem = videoStage;
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) {
                await elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }
            // Lock orientation to landscape for 90-degree rotation on mobile
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch(err) {
                console.log("Orientation lock not supported:", err);
            }
        } else {
            await document.exitFullscreen();
            try {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            } catch(e) {}
        }
        resetControlsTimer();
    });

    video.addEventListener('play', () => {
        isPlaying = true;
        updatePlayPauseUI();
        resetControlsTimer();
    });

    video.addEventListener('pause', () => {
        isPlaying = false;
        updatePlayPauseUI();
        resetControlsTimer();
    });

    video.addEventListener('volumechange', () => {
        isMuted = video.muted;
        updateMuteUI();
    });

    videoStage.addEventListener('click', (e) => {
        resetControlsTimer();
    });

    // Initial UI State
    updateMuteUI();
    updatePlayPauseUI();
    showLoading(true);
</script>
</body>
</html>
